<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Homepage on Railway">
  <title>Homepage — Deploy on Railway</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#e2e8f0" stop-opacity="0.85"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Glow -->
  <circle cx="950" cy="120" r="260" fill="#ffffff" opacity="0.08"/>
  <circle cx="200" cy="540" r="220" fill="#22d3ee" opacity="0.10"/>

  <!-- Dashboard tile grid mockup on the right -->
  <g transform="translate(740, 130)">
    <rect x="0"   y="0"   width="200" height="180" rx="18" fill="url(#tile)"/>
    <rect x="220" y="0"   width="200" height="180" rx="18" fill="url(#tile)" opacity="0.85"/>
    <rect x="0"   y="200" width="200" height="180" rx="18" fill="url(#tile)" opacity="0.7"/>
    <rect x="220" y="200" width="200" height="180" rx="18" fill="url(#tile)" opacity="0.55"/>
  </g>

  <!-- Left side: branding + tagline -->
  <g transform="translate(80, 200)" font-family="Inter, -apple-system, Segoe UI, Helvetica, Arial, sans-serif">
    <text y="0" font-size="22" font-weight="600" fill="#22d3ee" letter-spacing="6">RAILWAY TEMPLATE</text>
    <text y="100" font-size="92" font-weight="800" fill="#ffffff">Homepage</text>
    <text y="170" font-size="34" font-weight="500" fill="#e2e8f0">Your self-hosted start page,</text>
    <text y="218" font-size="34" font-weight="500" fill="#e2e8f0">deployable in 60 seconds.</text>

    <!-- Features pills -->
    <g transform="translate(0, 270)" font-size="22" font-weight="600" fill="#ffffff">
      <rect x="0"   y="0" width="160" height="48" rx="24" fill="url(#accent)"/>
      <text x="80" y="32" text-anchor="middle" fill="#ffffff">100+ Services</text>

      <rect x="180" y="0" width="160" height="48" rx="24" fill="#ffffff" fill-opacity="0.15"/>
      <text x="260" y="32" text-anchor="middle">Single Container</text>

      <rect x="360" y="0" width="200" height="48" rx="24" fill="#ffffff" fill-opacity="0.15"/>
      <text x="460" y="32" text-anchor="middle">Persistent Volume</text>
    </g>

    <!-- Deploy badge -->
    <g transform="translate(0, 360)">
      <rect x="0" y="0" width="320" height="58" rx="10" fill="#ffffff"/>
      <text x="160" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#1e3a8a">⚡  Deploy on Railway</text>
    </g>
  </g>
</svg>
