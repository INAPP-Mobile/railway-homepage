<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800" role="img" aria-label="Homepage template icon">
  <title>Homepage</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#e2e8f0" stop-opacity="0.85"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="800" rx="120" fill="url(#bg)"/>

  <!-- Subtle radial glow -->
  <circle cx="400" cy="400" r="320" fill="#ffffff" opacity="0.06"/>

  <!-- Dashboard tile grid (4-up) representing widgetized dashboard -->
  <g transform="translate(160, 160)">
    <rect x="0"   y="0"   width="220" height="220" rx="28" fill="url(#tile)"/>
    <rect x="260" y="0"   width="220" height="220" rx="28" fill="url(#tile)" opacity="0.85"/>
    <rect x="0"   y="260" width="220" height="220" rx="28" fill="url(#tile)" opacity="0.7"/>
    <rect x="260" y="260" width="220" height="220" rx="28" fill="url(#tile)" opacity="0.55"/>
  </g>

  <!-- Central monogram -->
  <g transform="translate(400, 400)" text-anchor="middle" font-family="Inter, -apple-system, Segoe UI, Helvetica, Arial, sans-serif" font-weight="800">
    <text y="22" font-size="180" fill="#1e3a8a">H</text>
  </g>

  <!-- Subtle brand mark bar -->
  <rect x="240" y="700" width="320" height="6" rx="3" fill="#ffffff" opacity="0.65"/>
  <text x="400" y="755" text-anchor="middle" font-family="Inter, -apple-system, Segoe UI, Helvetica, Arial, sans-serif" font-size="36" font-weight="600" fill="#ffffff" letter-spacing="3">HOMEPAGE</text>
</svg>
