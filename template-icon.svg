<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6D28D9"/><stop offset="100%" stop-color="#6C3FC5"/>
    </linearGradient>
  </defs>
  <rect width="800" height="800" rx="120" fill="url(#bg)"/>
  <!-- Bento grid dashboard -->
  <g transform="translate(400,400)">
    <!-- Large top card -->
    <rect x="-230" y="-200" width="280" height="160" rx="32" fill="#FFFFFF"/>
    <rect x="-190" y="-140" rx="6" width="20" height="60" fill="#6D28D9"/>
    <rect x="-155" y="-165" rx="6" width="20" height="85" fill="#6D28D9"/>
    <rect x="-120" y="-130" rx="6" width="20" height="50" fill="#6D28D9"/>
    <circle cx="-30" cy="-100" r="40" fill="none" stroke="#6D28D9" stroke-width="8"/>
    <!-- Small top-right card -->
    <rect x="80" y="-200" width="150" height="160" rx="32" fill="#FFFFFF"/>
    <circle cx="155" cy="-100" r="25" fill="#6D28D9" opacity="0.3"/>
    <circle cx="155" cy="-100" r="15" fill="#6D28D9" opacity="0.5"/>
    <circle cx="155" cy="-100" r="7" fill="#6D28D9"/>
    <!-- Bottom-left card -->
    <rect x="-230" y="10" width="180" height="190" rx="32" fill="#FFFFFF"/>
    <ellipse cx="-140" cy="110" rx="50" ry="40" fill="none" stroke="#6D28D9" stroke-width="6"/>
    <ellipse cx="-140" cy="110" rx="20" ry="15" fill="#6D28D9"/>
    <!-- Bottom-right card -->
    <rect x="-20" y="10" width="250" height="190" rx="32" fill="#FFFFFF"/>
    <rect x="40" y="60" rx="6" width="24" height="90" fill="#6D28D9"/>
    <rect x="80" y="90" rx="6" width="24" height="60" fill="#6D28D9"/>
    <rect x="120" y="50" rx="6" width="24" height="100" fill="#6D28D9"/>
    <rect x="160" y="80" rx="6" width="24" height="70" fill="#6D28D9"/>
  </g>
</svg>